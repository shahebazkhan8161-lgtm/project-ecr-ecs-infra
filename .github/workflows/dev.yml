name: "Infra DEV — Terraform"

on:
  push:
    branches: [develop]
  # Frontend/Backend repo trigger karta hai yahan
  repository_dispatch:
    types: [frontend-updated, backend-updated]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]
      image_tag:
        description: "Docker image tag (optional override)"
        required: false
        default: "dev-latest"

env:
  AWS_REGION:   ap-south-1
  ENVIRONMENT:  dev
  TF_VARS_FILE: envs/dev.tfvars
  TF_STATE_KEY: dev/terraform.tfstate
  TF_STATE_BUCKET: s3-ecr-ecs-bucket
  TF_LOCK_TABLE:   dynamo-ecr-ecs-table

permissions:
  id-token: write
  contents: read

jobs:

  # ── Resolve image tag ─────────────────────────────────
  # repository_dispatch se tag aata hai, manual se override
  resolve-tag:
    name: "Resolve Image Tag"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Get image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "image_tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=dev-latest" >> $GITHUB_OUTPUT
          fi

  # ── Terraform Init ────────────────────────────────────
  tf-init:
    name: "Terraform Init [DEV]"
    runs-on: ubuntu-latest
    needs: resolve-tag
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.DEV_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-dev-init-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-dev-${{ hashFiles('terraform/.terraform.lock.hcl') }}

  # ── Terraform Plan ────────────────────────────────────
  tf-plan:
    name: "Terraform Plan [DEV]"
    runs-on: ubuntu-latest
    needs: [tf-init, resolve-tag]
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.DEV_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-dev-plan-${{ github.run_id }}

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-dev-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="${{ env.TF_VARS_FILE }}" \
            -var="image_tag=${{ needs.resolve-tag.outputs.image_tag }}" \
            -var="db_password=${{ secrets.DEV_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.DEV_JWT_SECRET }}" \
            -out=tfplan-dev
        env:
          TF_VAR_db_password: ${{ secrets.DEV_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.DEV_JWT_SECRET }}

      - uses: actions/upload-artifact@v4
        with:
          name:           tfplan-dev
          path:           terraform/tfplan-dev
          retention-days: 1

  # ── Terraform Apply ───────────────────────────────────
  tf-apply:
    name: "Terraform Apply [DEV]"
    runs-on: ubuntu-latest
    needs: [tf-plan, resolve-tag]
    if: >
      github.event_name == 'push' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    defaults:
      run:
        working-directory: terraform
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.DEV_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-dev-apply-${{ github.run_id }}

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-dev-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: terraform/

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-dev
        env:
          TF_VAR_db_password: ${{ secrets.DEV_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.DEV_JWT_SECRET }}

      - name: CloudFront cache invalidation
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo "")
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
            echo "CloudFront cache invalidated — distribution: $DIST_ID"
          else
            echo "CloudFront distribution not found — skipping invalidation"
          fi

      - name: Deployment Summary
        run: |
          echo "### DEV Infra Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"               >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |"                 >> $GITHUB_STEP_SUMMARY
          echo "| Env | dev |"                 >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.resolve-tag.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.event_name }} |"                >> $GITHUB_STEP_SUMMARY
          echo "| App URL | https://shabaz.mytitan.in |"                    >> $GITHUB_STEP_SUMMARY

  # ── Terraform Destroy ─────────────────────────────────
  tf-destroy:
    name: "Terraform Destroy [DEV]"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    defaults:
      run:
        working-directory: terraform
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.DEV_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-dev-destroy-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="${{ env.TF_VARS_FILE }}" \
            -var="db_password=${{ secrets.DEV_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.DEV_JWT_SECRET }}" \
            -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DEV_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.DEV_JWT_SECRET }}
