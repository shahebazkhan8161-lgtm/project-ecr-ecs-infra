name: "Hotfix — Emergency PRODUCTION Deploy"

# Hotfix branches production mein seedha jaati hain
# hotfix/fix-login, hotfix/fix-payment etc.
on:
  push:
    branches:
      - 'hotfix/*'
  repository_dispatch:
    types: [frontend-updated, backend-updated]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "apply"
        type: choice
        options: [plan, apply, destroy]
      image_tag:
        description: "Docker image tag"
        required: false
        default: ""

env:
  AWS_REGION:      ap-south-1
  ENVIRONMENT:     production          # hotfix hamesha production mein jaata hai
  TF_VARS_FILE:    envs/production.tfvars
  TF_STATE_KEY:    production/terraform.tfstate
  TF_STATE_BUCKET: s3-ecr-ecs-bucket
  TF_LOCK_TABLE:   dynamo-ecr-ecs-table

permissions:
  id-token: write
  contents: read

jobs:

  # ── Resolve image tag ─────────────────────────────────
  resolve-tag:
    name: "Resolve Image Tag"
    runs-on: ubuntu-latest
    outputs:
      image_tag:    ${{ steps.tag.outputs.image_tag }}
      hotfix_name:  ${{ steps.tag.outputs.hotfix_name }}

    steps:
      - name: Get image tag
        id: tag
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          HOTFIX_NAME="${BRANCH#hotfix/}"   # "hotfix/fix-login" → "fix-login"

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "image_tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=hotfix-$SHA" >> $GITHUB_OUTPUT
          fi

          echo "hotfix_name=$HOTFIX_NAME" >> $GITHUB_OUTPUT

  # ── Terraform Init ────────────────────────────────────
  tf-init:
    name: "Terraform Init [HOTFIX→PROD]"
    runs-on: ubuntu-latest
    needs: resolve-tag
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.PROD_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-hotfix-init-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-prod-${{ hashFiles('terraform/.terraform.lock.hcl') }}

  # ── Terraform Plan ────────────────────────────────────
  tf-plan:
    name: "Terraform Plan [HOTFIX→PROD]"
    runs-on: ubuntu-latest
    needs: [tf-init, resolve-tag]
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.PROD_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-hotfix-plan-${{ github.run_id }}

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-prod-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="${{ env.TF_VARS_FILE }}" \
            -var="image_tag=${{ needs.resolve-tag.outputs.image_tag }}" \
            -var="db_password=${{ secrets.PROD_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.PROD_JWT_SECRET }}" \
            -out=tfplan-hotfix
        env:
          TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.PROD_JWT_SECRET }}

      - uses: actions/upload-artifact@v4
        with:
          name:           tfplan-hotfix
          path:           terraform/tfplan-hotfix
          retention-days: 1

  # ── Approval Gate — STRICT (emergency context) ────────
  # Hotfix mein bhi approval chahiye — production hai
  # Lekin reviewers ko jaldi approve karna chahiye
  approval-gate:
    name: "HOTFIX Approval Required"
    runs-on: ubuntu-latest
    needs: tf-plan
    if: >
      github.event_name == 'push' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: production   # Same production environment — same reviewers
    steps:
      - name: Hotfix details
        run: |
          echo "HOTFIX: ${{ needs.resolve-tag.outputs.hotfix_name }}"
          echo "Image:  ${{ needs.resolve-tag.outputs.image_tag }}"
          echo "Branch: ${{ github.ref_name }}"

  # ── Terraform Apply ───────────────────────────────────
  tf-apply:
    name: "Terraform Apply [HOTFIX→PROD]"
    runs-on: ubuntu-latest
    needs: [approval-gate, resolve-tag]
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.PROD_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-hotfix-apply-${{ github.run_id }}

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-prod-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-hotfix
          path: terraform/

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-hotfix
        env:
          TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.PROD_JWT_SECRET }}

      - name: CloudFront cache invalidation
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo "")
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
            echo "CloudFront cache cleared"
          fi

      - name: Hotfix deployment summary
        run: |
          echo "### HOTFIX Deploy Complete"   >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"              >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |"               >> $GITHUB_STEP_SUMMARY
          echo "| Hotfix | ${{ needs.resolve-tag.outputs.hotfix_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |"                       >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.resolve-tag.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |"                             >> $GITHUB_STEP_SUMMARY
          echo "| App URL | https://shabaz.mytitan.in |"                    >> $GITHUB_STEP_SUMMARY
          echo ""                                                            >> $GITHUB_STEP_SUMMARY
          echo "> **Next step:** Hotfix ko develop mein bhi merge karo" >> $GITHUB_STEP_SUMMARY
          echo "> \`git checkout develop && git merge ${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Notify: merge hotfix to develop ──────────────────
  # Production mein deploy hone ke baad developer ko remind karo
  notify-merge-to-develop:
    name: "Remind: Merge hotfix to develop"
    runs-on: ubuntu-latest
    needs: tf-apply

    steps:
      - name: Create reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const hotfixBranch = '${{ github.ref_name }}';
            const hotfixName   = '${{ needs.resolve-tag.outputs.hotfix_name }}';
            const imageTag     = '${{ needs.resolve-tag.outputs.image_tag }}';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[Hotfix] Merge ${hotfixBranch} into develop`,
              body: [
                `## Hotfix deployed to PRODUCTION`,
                ``,
                `**Hotfix:** \`${hotfixName}\``,
                `**Branch:** \`${hotfixBranch}\``,
                `**Image:** \`${imageTag}\``,
                `**Commit:** \`${{ github.sha }}\``,
                ``,
                `## Action required`,
                ``,
                `Hotfix PRODUCTION mein deploy ho gaya.`,
                `Ab yeh fix \`develop\` branch mein bhi merge karo taaki`,
                `agli release mein bhi yeh fix rahei:`,
                ``,
                `\`\`\`bash`,
                `git checkout develop`,
                `git merge ${hotfixBranch}`,
                `git push origin develop`,
                `git branch -d ${hotfixBranch}          # local branch delete`,
                `git push origin --delete ${hotfixBranch} # remote branch delete`,
                `\`\`\``,
              ].join('\n'),
              labels: ['hotfix', 'action-required'],
            });
