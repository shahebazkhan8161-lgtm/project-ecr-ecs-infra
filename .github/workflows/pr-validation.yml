name: "PR Validation — Terraform Lint & Plan Preview"

# Sirf PR pe chalta hai infra repo mein
# Terraform fmt check + validate + plan preview PR comment mein
on:
  pull_request:
    branches: [develop, staging, main]
    types: [opened, synchronize, reopened]

permissions:
  id-token:      write
  contents:      read
  pull-requests: write

env:
  AWS_REGION: ap-south-1

jobs:

  # ── Terraform format check ────────────────────────────
  tf-lint:
    name: "Terraform lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: |
          terraform init -backend=false
          terraform validate

  # ── Plan preview on PR ────────────────────────────────
  tf-plan-preview:
    name: "Plan preview"
    runs-on: ubuntu-latest
    needs: tf-lint
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Detect target environment
        id: env
        run: |
          TARGET="${{ github.base_ref }}"
          if   [ "$TARGET" = "main" ];    then
            echo "env=production" >> $GITHUB_OUTPUT
            echo "vars=envs/production.tfvars" >> $GITHUB_OUTPUT
            echo "key=production/terraform.tfstate" >> $GITHUB_OUTPUT
            echo "role=${{ secrets.PROD_IAM_ROLE_ARN }}" >> $GITHUB_OUTPUT
          elif [ "$TARGET" = "staging" ]; then
            echo "env=uat"        >> $GITHUB_OUTPUT
            echo "vars=envs/uat.tfvars" >> $GITHUB_OUTPUT
            echo "key=uat/terraform.tfstate" >> $GITHUB_OUTPUT
            echo "role=${{ secrets.UAT_IAM_ROLE_ARN }}" >> $GITHUB_OUTPUT
          else
            echo "env=dev"        >> $GITHUB_OUTPUT
            echo "vars=envs/dev.tfvars" >> $GITHUB_OUTPUT
            echo "key=dev/terraform.tfstate" >> $GITHUB_OUTPUT
            echo "role=${{ secrets.DEV_IAM_ROLE_ARN }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ steps.env.outputs.role }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-pr-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=s3-ecr-ecs-bucket" \
            -backend-config="key=${{ steps.env.outputs.key }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=dynamo-ecr-ecs-table"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="${{ steps.env.outputs.vars }}" \
            -var="db_password=REDACTED" \
            -var="jwt_secret=REDACTED" \
            -no-color 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const plan = fs.readFileSync('terraform/plan-output.txt', 'utf8');
            const truncated = plan.length > 50000
              ? plan.substring(0, 50000) + '\n\n... [truncated — run locally for full output]'
              : plan;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body: [
                `### Terraform Plan — \`${{ steps.env.outputs.env }}\``,
                ``,
                `PR: **${{ github.head_ref }}** → **${{ github.base_ref }}**`,
                ``,
                `<details><summary>Show plan</summary>`,
                ``,
                '```hcl',
                truncated,
                '```',
                ``,
                `</details>`,
              ].join('\n')
            });
