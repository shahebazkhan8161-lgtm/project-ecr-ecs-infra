name: "Infra PRODUCTION — Terraform"

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [frontend-updated, backend-updated]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]
      image_tag:
        description: "Docker image tag (optional override)"
        required: false
        default: "prod-latest"

env:
  AWS_REGION:      ap-south-1
  ENVIRONMENT:     production
  TF_VARS_FILE:    envs/production.tfvars
  TF_STATE_KEY:    production/terraform.tfstate
  TF_STATE_BUCKET: s3-ecr-ecs-bucket
  TF_LOCK_TABLE:   dynamo-ecr-ecs-table

permissions:
  id-token: write
  contents: read

jobs:

  # ── Resolve image tag ─────────────────────────────────
  resolve-tag:
    name: "Resolve Image Tag"
    runs-on: ubuntu-latest
    outputs:
      image_tag:    ${{ steps.tag.outputs.image_tag }}
      triggered_by: ${{ steps.tag.outputs.triggered_by }}

    steps:
      - name: Get image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "image_tag=${{ github.event.client_payload.image_tag }}"      >> $GITHUB_OUTPUT
            echo "triggered_by=${{ github.event.client_payload.triggered_by }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
            echo "triggered_by=manual"                            >> $GITHUB_OUTPUT
          else
            echo "image_tag=prod-latest" >> $GITHUB_OUTPUT
            echo "triggered_by=push"     >> $GITHUB_OUTPUT
          fi

  # ── Terraform Init ────────────────────────────────────
  tf-init:
    name: "Terraform Init [PROD]"
    runs-on: ubuntu-latest
    needs: resolve-tag
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.PROD_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-prod-init-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-prod-${{ hashFiles('terraform/.terraform.lock.hcl') }}

  # ── Terraform Plan ────────────────────────────────────
  tf-plan:
    name: "Terraform Plan [PROD]"
    runs-on: ubuntu-latest
    needs: [tf-init, resolve-tag]
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.PROD_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-prod-plan-${{ github.run_id }}

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-prod-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="${{ env.TF_VARS_FILE }}" \
            -var="image_tag=${{ needs.resolve-tag.outputs.image_tag }}" \
            -var="db_password=${{ secrets.PROD_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.PROD_JWT_SECRET }}" \
            -out=tfplan-prod
        env:
          TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.PROD_JWT_SECRET }}

      - uses: actions/upload-artifact@v4
        with:
          name:           tfplan-prod
          path:           terraform/tfplan-prod
          retention-days: 1

  # ── Approval Gate — STRICT ────────────────────────────
  approval-gate:
    name: "Waiting for PRODUCTION Approval"
    runs-on: ubuntu-latest
    needs: tf-plan
    if: >
      github.event_name == 'push' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: production    # Senior reviewers + optional wait timer
    steps:
      - run: echo "PRODUCTION approved — proceeding to apply"

  # ── Terraform Apply ───────────────────────────────────
  tf-apply:
    name: "Terraform Apply [PROD]"
    runs-on: ubuntu-latest
    needs: [approval-gate, resolve-tag]
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.PROD_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-prod-apply-${{ github.run_id }}

      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-prod-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: terraform/

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-prod
        env:
          TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.PROD_JWT_SECRET }}

      - name: CloudFront cache invalidation
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo "")
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
            echo "CloudFront cache invalidated — distribution: $DIST_ID"
          else
            echo "CloudFront distribution not found — skipping invalidation"
          fi

      - name: Deployment Summary
        run: |
          echo "### PRODUCTION Deploy Complete"  >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                 >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |"                   >> $GITHUB_STEP_SUMMARY
          echo "| Env | production |"            >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.resolve-tag.outputs.image_tag }} |"   >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ needs.resolve-tag.outputs.triggered_by }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |"                                >> $GITHUB_STEP_SUMMARY
          echo "| App URL | https://shabaz.mytitan.in |"                       >> $GITHUB_STEP_SUMMARY

  # ── Terraform Destroy — Manual + Approval ONLY ────────
  tf-destroy:
    name: "Terraform Destroy [PROD]"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    defaults:
      run:
        working-directory: terraform
    environment: production    # Approval required before destroy

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.PROD_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-prod-destroy-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="${{ env.TF_VARS_FILE }}" \
            -var="db_password=${{ secrets.PROD_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.PROD_JWT_SECRET }}" \
            -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.PROD_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.PROD_JWT_SECRET }}
