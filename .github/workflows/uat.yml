name: "Infra UAT — Terraform"

on:
  push:
    branches: [staging]
  repository_dispatch:
    types: [frontend-updated, backend-updated]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options: [plan, apply, destroy]
      image_tag:
        description: "Docker image tag (optional override)"
        required: false
        default: "uat-latest"

env:
  AWS_REGION:      ap-south-1
  ENVIRONMENT:     uat
  TF_VARS_FILE:    envs/uat.tfvars
  TF_STATE_KEY:    uat/terraform.tfstate
  TF_STATE_BUCKET: s3-ecr-ecs-bucket
  TF_LOCK_TABLE:   dynamo-ecr-ecs-table

permissions:
  id-token: write
  contents: read

jobs:

  resolve-tag:
    name: "Resolve Image Tag"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Get image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "image_tag=${{ github.event.client_payload.image_tag }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=uat-latest" >> $GITHUB_OUTPUT
          fi

  tf-init:
    name: "Terraform Init [UAT]"
    runs-on: ubuntu-latest
    needs: resolve-tag
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.UAT_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-uat-init-${{ github.run_id }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-uat-${{ hashFiles('terraform/.terraform.lock.hcl') }}

  tf-plan:
    name: "Terraform Plan [UAT]"
    runs-on: ubuntu-latest
    needs: [tf-init, resolve-tag]
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.UAT_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-uat-plan-${{ github.run_id }}
      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-uat-${{ hashFiles('terraform/.terraform.lock.hcl') }}
      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="${{ env.TF_VARS_FILE }}" \
            -var="image_tag=${{ needs.resolve-tag.outputs.image_tag }}" \
            -var="db_password=${{ secrets.UAT_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.UAT_JWT_SECRET }}" \
            -out=tfplan-uat
        env:
          TF_VAR_db_password: ${{ secrets.UAT_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.UAT_JWT_SECRET }}
      - uses: actions/upload-artifact@v4
        with:
          name:           tfplan-uat
          path:           terraform/tfplan-uat
          retention-days: 1

  # ── Approval Gate ─────────────────────────────────────
  approval-gate:
    name: "Waiting for UAT Approval"
    runs-on: ubuntu-latest
    needs: tf-plan
    if: >
      github.event_name == 'push' ||
      github.event_name == 'repository_dispatch' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: uat
    steps:
      - run: echo "UAT approved — proceeding to apply"

  tf-apply:
    name: "Terraform Apply [UAT]"
    runs-on: ubuntu-latest
    needs: [approval-gate, resolve-tag]
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.UAT_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-uat-apply-${{ github.run_id }}
      - uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: tf-infra-uat-${{ hashFiles('terraform/.terraform.lock.hcl') }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-uat
          path: terraform/
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan-uat
        env:
          TF_VAR_db_password: ${{ secrets.UAT_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.UAT_JWT_SECRET }}
      - name: CloudFront cache invalidation
        run: |
          DIST_ID=$(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo "")
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*"
            echo "CloudFront cache invalidated — distribution: $DIST_ID"
          else
            echo "CloudFront distribution not found — skipping invalidation"
          fi

      - name: Deployment Summary
        run: |
          echo "### UAT Infra Deploy Complete"  >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |"                  >> $GITHUB_STEP_SUMMARY
          echo "| Env | uat |"                  >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.resolve-tag.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.event_name }} |"                >> $GITHUB_STEP_SUMMARY
          echo "| App URL | https://shabaz.mytitan.in |"                    >> $GITHUB_STEP_SUMMARY

  tf-destroy:
    name: "Terraform Destroy [UAT]"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    defaults:
      run:
        working-directory: terraform
    environment: uat
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.UAT_IAM_ROLE_ARN }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: gh-infra-uat-destroy-${{ github.run_id }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ env.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"
      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="${{ env.TF_VARS_FILE }}" \
            -var="db_password=${{ secrets.UAT_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.UAT_JWT_SECRET }}" \
            -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.UAT_DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.UAT_JWT_SECRET }}
